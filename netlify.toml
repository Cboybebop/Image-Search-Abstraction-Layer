[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/query/*"
  to = "/.netlify/functions/api/query/:splat"
  status = 200

[[redirects]]
  from = "/recent"
  to = "/.netlify/functions/api/recent"
  status = 200

[[redirects]]
  from = "/recent/"
  to = "/.netlify/functions/api/recent"
  status = 200